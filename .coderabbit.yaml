# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Inherits org-wide config from stolostron/coderabbit.
# Only project-specific overrides are defined here.

inheritance: true

reviews:
  auto_approve: true
  request_changes_workflow: true

  auto_review:
    enabled: true
    drafts: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"

  path_filters:
    - "!swarmer/static/**"

  path_instructions:
    # ── Project-specific conventions (from AGENTS.md) ──────────────────────
    - path: "swarmer/routers/**/*.py"
      instructions: |
        Console route handlers (server-rendered HTMX).
        - Every route (except /login, /auth/callback) must use Depends(require_auth)
        - POST routes must return RedirectResponse(status_code=302) (PRG pattern)
        - DB access via Depends(get_db); flag direct engine usage
        - Flag synchronous kubernetes client calls not wrapped in asyncio.to_thread()
        - HTMX partials return HTMLResponse; full pages use templates.TemplateResponse

    - path: "swarmer/api/**/*.py"
      instructions: |
        REST API v1 endpoints.
        - All routes must use Depends(require_bearer) for K8s token auth
        - Request/response models must use Pydantic schemas from api/schemas.py
        - Flag any direct template rendering (API must return JSON only)
        - Flag synchronous kubernetes calls not wrapped in asyncio.to_thread()

    - path: "swarmer/models/**/*.py"
      instructions: |
        SQLAlchemy 2.x ORM models (async, SQLite backend).
        - All columns must use Mapped[type] declarative style
        - New columns on existing tables need a migration in database.py:migrate_db() with server_default
        - Flag mutable default arguments
        - Encrypted fields must use crypto.encrypt()/crypto.decrypt()

    - path: "swarmer/agent_tools/**/*.py"
      instructions: |
        Agent tool strategies (OpenCode) implementing AgentToolStrategy ABC.
        - Each strategy must implement all abstract methods from __init__.py
        - Model ID format: provider/model@version
        - Flag hardcoded image tags or registry URLs

    - path: "swarmer/templates/**/*.html"
      instructions: |
        Jinja2 + HTMX + PatternFly 6 templates.
        - HTMX partials are prefixed with _ (e.g., _status_badge.html)
        - Check hx-get/hx-post/hx-target/hx-swap attribute correctness
        - Forms must include CSRF protection
        - Flag inline JavaScript that could use HTMX instead

    - path: "mcp-server/**/*.py"
      instructions: |
        Standalone MCP server package (fastmcp).
        - This is a separate installable package with its own pyproject.toml
        - Auth uses K8s bearer tokens (env var > in-cluster SA > kubeconfig)
        - Flag any imports from the swarmer package (these are separate packages)

    - path: "tests/**/*.py"
      instructions: |
        Relaxed style rules for tests.
        - Tests stub model objects with plain classes to avoid SQLAlchemy deps
        - Flag tests that assert nothing meaningful
        - async tests use pytest-asyncio; HTTP mocking uses respx

    - path: "k8s/**/*.yaml"
      instructions: |
        Kubernetes manifests.
        - deployment.yaml uses SED placeholders (SWARMER_IMAGE, AGENT_IMAGE_OPENCODE_VALUE, etc.) — do not replace with real values
        - Flag any hardcoded secrets, registry URLs, or cluster-specific values

    - path: "**/*.py"
      instructions: |
        General Python standards for this project.
        - Python 3.12; use X | None union syntax, not Optional[X]
        - Type hints on all public function signatures
        - Flag hardcoded credentials, API keys, or secret values
        - Flag subprocess calls with shell=True when user input is involved
        - Kubernetes imports must be lazy (inside functions) to avoid import errors when K8s isn't configured

  tools:
    ruff:
      enabled: true
    pylint:
      enabled: false
    flake8:
      enabled: false
    golangci-lint:
      enabled: false
    gitleaks:
      enabled: true
    semgrep:
      enabled: true
    checkov:
      enabled: true
    hadolint:
      enabled: true
    trivy:
      enabled: true
    osvScanner:
      enabled: true
    actionlint:
      enabled: true
    ast-grep:
      essential_rules: true

  pre_merge_checks:
    description:
      mode: "warning"
    custom_checks:
      - name: "no-hardcoded-secrets"
        instructions: |
          Flag hardcoded secrets: API keys, tokens, passwords, private
          keys, credentials. Also flag base64 strings >32 chars in config,
          URLs with embedded credentials, variables named api_key/secret/
          token/password assigned string literals.
        mode: "error"

      - name: "no-weak-crypto"
        instructions: |
          Flag MD5, SHA1, DES, RC4, 3DES, Blowfish, ECB mode usage.
          Flag custom crypto implementations. Flag non-constant-time
          comparison of secrets or tokens.
        mode: "error"

      - name: "no-injection-vectors"
        instructions: |
          Flag SQL string concatenation, shell=True with user input,
          eval/exec on untrusted data, pickle.loads on untrusted input,
          yaml.load without SafeLoader, os.system with variables,
          dangerouslySetInnerHTML with user data.
        mode: "error"

      - name: "container-privileges"
        instructions: |
          Flag privileged: true, hostPID, hostNetwork, hostIPC,
          SYS_ADMIN capability, running as root without justification,
          allowPrivilegeEscalation: true in container/K8s manifests.
        mode: "error"

      - name: "no-sensitive-data-in-logs"
        instructions: |
          Flag logging that may expose passwords, tokens, API keys,
          PII (email, SSN, credit card), session IDs, internal
          hostnames, or customer data.
        mode: "error"

      - name: "ai-attribution"
        instructions: |
          If AI tools were used (mentioned in PR or commits), verify
          Red Hat attribution: Assisted-by or Generated-by trailers.
          Flag use of Co-Authored-By for AI tools.
        mode: "warning"

knowledge_base:
  learnings:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "**/GEMINI.md"
      - "**/CONTRIBUTING.md"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"

chat:
  auto_reply: true
