name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      # Pinned: ruff 0.16.0 (released 2026-07-24) expanded its default rule
      # selection (adds isort/flake8-blind-except/tryceratops/etc. checks),
      # which surfaces ~345 pre-existing findings across swarmer/ unrelated
      # to any single PR. Pin to the last known-good version until those are
      # triaged and either fixed or an explicit `[tool.ruff]` rule selection
      # is added to pin the intended rule set independent of ruff's own
      # evolving defaults.
      - run: pip install ruff==0.15.22

      - run: ruff check swarmer/
